backend:
  name: github
  repo: lamaisonrosedewallerand/lamaisonrose-site
  branch: main

media_folder: "assets/uploads"
public_folder: "/assets/uploads"

collections:
  - name: "stages"
    label: "Stages"
    folder: "content/stages"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Titre", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime" }
      - { label: "Prix", name: "price", widget: "string", required: false }
      - { label: "Image", name: "image", widget: "image", required: false }
      - { label: "Lien HelloAsso", name: "helloasso", widget: "string", required: false }
      - { label: "Description", name: "body", widget: "markdown" }

  - name: "evenements"
    label: "Événements"
    folder: "content/evenements"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Titre", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime" }
      - { label: "Image", name: "image", widget: "image", required: false }
      - { label: "Lien HelloAsso", name: "helloasso", widget: "string", required: false }
      - { label: "Description", name: "body", widget: "markdown" }
