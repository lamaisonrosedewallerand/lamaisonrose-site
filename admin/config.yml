backend:
  name: github
  repo: lamaisonrosedewallerand/lamaisonrose-site
  branch: main
  squash_merges: true

publish_mode: simple
media_folder: "assets/uploads"
public_folder: "/assets/uploads"

collections:
  - name: "site"
    label: "Reglages du site"
    files:
      - label: "Reglages generaux"
        name: "settings"
        file: "content/site/settings.md"
        fields:
          - label: "Mode annonce header"
            name: "announcement_mode"
            widget: "select"
            options:
              - { label: "Auto : prochain evenement", value: "auto" }
              - { label: "Texte personnalise", value: "custom" }
              - { label: "Masquer l'annonce", value: "off" }
            default: "auto"
          - { label: "Texte annonce personnalisee", name: "announcement_text", widget: "string", required: false }
          - { label: "Lien annonce personnalisee", name: "announcement_link", widget: "string", required: false }
          - { label: "Rotation bandeau header (secondes)", name: "announcement_rotation_seconds", widget: "number", value_type: "int", min: 3, required: false, default: 6 }
          - { label: "E-mail principal", name: "contact_email", widget: "string" }
          - { label: "Telephone", name: "contact_phone", widget: "string" }
          - { label: "Adresse ligne 1", name: "address_line_1", widget: "string" }
          - { label: "Adresse ligne 2", name: "address_line_2", widget: "string" }
          - { label: "Lien Instagram", name: "instagram_url", widget: "string", required: false }
          - { label: "Lien Facebook", name: "facebook_url", widget: "string", required: false }
          - { label: "Lien HelloAsso principal", name: "helloasso_url", widget: "string", required: false }
          - { label: "Slug organisation HelloAsso", name: "helloasso_organization_slug", widget: "string", required: false, hint: "Exemple : la-maison-rose-de-wallerand" }
          - { label: "Image hero accueil", name: "home_hero_image", widget: "image", required: false }
          - { label: "Nom article HelloAsso adhesion individuelle", name: "helloasso_checkout_membership_item_name", widget: "string", required: false }
          - { label: "Montant adhesion individuelle", name: "helloasso_checkout_membership_amount", widget: "number", value_type: "int", min: 1, required: false, default: 20 }
          - { label: "Nom article HelloAsso adhesion couple", name: "helloasso_checkout_membership_couple_item_name", widget: "string", required: false }
          - { label: "Montant adhesion couple", name: "helloasso_checkout_membership_couple_amount", widget: "number", value_type: "int", min: 1, required: false, default: 30 }
          - { label: "Nom article HelloAsso soutien", name: "helloasso_checkout_support_item_name", widget: "string", required: false }
          - { label: "Montant checkout par defaut", name: "helloasso_checkout_default_amount", widget: "number", value_type: "int", min: 1, required: false, default: 50 }
          - { label: "Montant checkout minimum", name: "helloasso_checkout_min_amount", widget: "number", value_type: "int", min: 1, required: false, default: 10 }
          - { label: "Montants suggeres checkout", name: "helloasso_checkout_suggested_amounts", widget: "string", required: false, hint: "Exemple : 20,50,100,250" }
          - { label: "URL widget HelloAsso", name: "helloasso_widget_url", widget: "string", required: false, hint: "Exemple : .../adhesions/nom/widget ou .../formulaires/1/widget" }
          - { label: "Hauteur widget HelloAsso", name: "helloasso_widget_height", widget: "number", value_type: "int", min: 500, required: false, default: 780 }
          - { label: "Note interne", name: "body", widget: "markdown", required: false }

  - name: "stages"
    label: "Stages"
    folder: "content/stages"
    create: true
    slug: "{{slug}}"
    summary: "{{title}} - {{date}}"
    fields:
      - { label: "Titre", name: "title", widget: "string" }
      - { label: "Titre (EN)", name: "title_en", widget: "string", required: false }
      - { label: "Date", name: "date", widget: "date" }
      - { label: "Horaire", name: "time", widget: "string", required: false }
      - { label: "Horaire (EN)", name: "time_en", widget: "string", required: false }
      - { label: "Prix", name: "price", widget: "string", required: false }
      - { label: "Prix (EN)", name: "price_en", widget: "string", required: false }
      - { label: "Duree", name: "duration", widget: "string", required: false }
      - { label: "Duree (EN)", name: "duration_en", widget: "string", required: false }
      - { label: "Nombre de places", name: "places", widget: "number", value_type: "int", min: 0, required: false }
      - { label: "Discipline", name: "discipline", widget: "string", required: false, hint: "Exemple : Gravure, Chant, Sculpture" }
      - { label: "Discipline (EN)", name: "discipline_en", widget: "string", required: false }
      - { label: "Niveau", name: "level", widget: "string", required: false }
      - { label: "Niveau (EN)", name: "level_en", widget: "string", required: false }
      - { label: "Image", name: "image", widget: "image", required: false }
      - { label: "Lien HelloAsso", name: "helloasso_url", widget: "string", required: false }
      - label: "Statut"
        name: "status"
        widget: "select"
        options: ["ouvert", "complet", "passe"]
        default: "ouvert"
      - { label: "Mettre en avant sur l'accueil", name: "featured", widget: "boolean", default: false, required: false }
      - { label: "Résumé court (EN)", name: "summary_en", widget: "text", required: false, hint: "Résumé anglais utilisé sur les cartes et les blocs mis en avant." }
      - { label: "Description", name: "body", widget: "markdown" }

  - name: "spotlights"
    label: "Bloc artistes accueil"
    folder: "content/spotlights"
    create: true
    slug: "{{slug}}"
    summary: "{{title}}"
    fields:
      - { label: "Titre", name: "title", widget: "string", required: false }
      - { label: "Titre (EN)", name: "title_en", widget: "string", required: false }
      - { label: "Sur-titre", name: "eyebrow", widget: "string", required: false, hint: "Petit libellé affiché au-dessus du portrait." }
      - { label: "Sur-titre (EN)", name: "eyebrow_en", widget: "string", required: false }
      - { label: "Image", name: "image", widget: "image" }
      - { label: "Position", name: "position", widget: "number", value_type: "int", min: 1, required: false, default: 99 }
      - { label: "Actif", name: "active", widget: "boolean", default: true, required: false }
      - { label: "Note interne", name: "body", widget: "markdown", required: false, hint: "Ce bloc pilote les photos artistes visibles sur l'accueil, juste à côté de l'événement à la une." }

  - name: "evenements"
    label: "Evenements"
    folder: "content/evenements"
    create: true
    slug: "{{slug}}"
    summary: "{{title}} - {{date}}"
    fields:
      - { label: "Titre", name: "title", widget: "string" }
      - { label: "Titre (EN)", name: "title_en", widget: "string", required: false }
      - { label: "Date", name: "date", widget: "date" }
      - { label: "Horaire", name: "time", widget: "string", required: false }
      - { label: "Horaire (EN)", name: "time_en", widget: "string", required: false }
      - { label: "Lieu", name: "location", widget: "string", required: false }
      - { label: "Lieu (EN)", name: "location_en", widget: "string", required: false }
      - { label: "Image", name: "image", widget: "image", required: false }
      - { label: "Audio", name: "audio_url", widget: "file", required: false, hint: "Ajoute ici un fichier audio pour l'événement (m4a, mp3, wav...)." }
      - { label: "Titre audio", name: "audio_title", widget: "string", required: false }
      - { label: "Titre audio (EN)", name: "audio_title_en", widget: "string", required: false }
      - label: "Entree"
        name: "entry"
        widget: "select"
        options: ["Entree libre", "Entree payante"]
        default: "Entree libre"
      - { label: "Entrée (EN)", name: "entry_en", widget: "string", required: false }
      - { label: "Lien HelloAsso", name: "helloasso_url", widget: "string", required: false }
      - label: "Statut"
        name: "status"
        widget: "select"
        options: ["a-venir", "passe"]
        default: "a-venir"
      - { label: "Mettre en avant sur l'accueil", name: "featured", widget: "boolean", default: false, required: false }
      - { label: "Résumé court (EN)", name: "summary_en", widget: "text", required: false, hint: "Résumé anglais utilisé sur les cartes et les blocs mis en avant." }
      - { label: "Description", name: "body", widget: "markdown" }
